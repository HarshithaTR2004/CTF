upstream backend {
    server backend:5000;
}

# HTTP (health checks, Cloudflare tunnel origin, or plain LAN)
server {
    listen 80;
    server_name _;

    include /etc/nginx/conf.d/app-server.inc;
}

# HTTPS (browsers / LAN devices)
server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/server.crt;
    ssl_certificate_key /etc/nginx/ssl/server.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    include /etc/nginx/conf.d/app-server.inc;
}
